<?xml version="1.0" encoding="UTF-8"?>
<!-- Rosso  mascotte cartoon sportbike (stile Panigale, no marchi terzi) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Rosso mascotte MotoGarage">
  <defs>
    <linearGradient id="rosso-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3B1F"/>
      <stop offset="55%" stop-color="#ED2100"/>
      <stop offset="100%" stop-color="#9B1200"/>
    </linearGradient>
    <linearGradient id="rosso-highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B4A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ED2100" stop-opacity="0"/>
    </linearGradient>
    <filter id="rosso-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#rosso-shadow)">
    <!-- Ruota posteriore -->
    <circle cx="88" cy="198" r="42" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
    <circle cx="88" cy="198" r="28" fill="#2a2a2a" stroke="#444" stroke-width="3"/>
    <circle cx="88" cy="198" r="10" fill="#555"/>
    <!-- Ruota anteriore -->
    <circle cx="298" cy="198" r="42" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
    <circle cx="298" cy="198" r="28" fill="#2a2a2a" stroke="#444" stroke-width="3"/>
    <circle cx="298" cy="198" r="10" fill="#555"/>
    <!-- Telaio / swingarm -->
    <path d="M88 198 L155 165 L210 175 L248 188" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>
    <path d="M155 165 L175 120 L220 95" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
    <!-- Corpo rosso -->
    <path d="M175 120 L248 88 L320 95 L340 130 L330 165 L280 175 L210 175 L175 155 Z" fill="url(#rosso-body)"/>
    <path d="M200 100 L290 98 L310 125 L260 140 Z" fill="url(#rosso-highlight)" opacity="0.55"/>
    <!-- Codino -->
    <path d="M155 165 L130 145 L115 125 L145 118 L175 130 Z" fill="#C01800"/>
    <!-- Serbatoio -->
    <path d="M210 115 L265 108 L275 138 L220 148 Z" fill="#FF4528" opacity="0.35"/>
    <!-- Scarico -->
    <path d="M130 158 L95 168 L88 182 L105 182 L135 168 Z" fill="#888"/>
    <!-- Fari = occhi -->
    <g id="eyes">
      <ellipse cx="292" cy="118" rx="22" ry="20" fill="#FFF"/>
      <ellipse cx="318" cy="118" rx="22" ry="20" fill="#FFF"/>
      <circle cx="296" cy="120" r="9" fill="#1a1a1a"/>
      <circle cx="322" cy="120" r="9" fill="#1a1a1a"/>
      <circle cx="299" cy="117" r="3.5" fill="#FFF"/>
      <circle cx="325" cy="117" r="3.5" fill="#FFF"/>
    </g>
    <!-- Sorriso -->
    <path id="smile" d="M278 142 Q305 158 335 142" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <!-- Guance -->
    <circle cx="268" cy="135" r="6" fill="#FF8A70" opacity="0.55"/>
    <circle cx="342" cy="135" r="6" fill="#FF8A70" opacity="0.55"/>
    <!-- Braccio cartoon (saluto) -->
    <g id="arm" transform="rotate(-18 250 130)">
      <path d="M230 125 L200 95 L195 88" fill="none" stroke="#ED2100" stroke-width="10" stroke-linecap="round"/>
      <circle cx="192" cy="85" r="12" fill="#FF6B4A" stroke="#9B1200" stroke-width="2"/>
    </g>
  </g>
</svg>
