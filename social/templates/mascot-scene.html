<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Archivo:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; }
    body {
      background: radial-gradient(ellipse 90% 60% at 50% 30%, #28282B 0%, #0F0B0A 50%, #0F0B0A 100%);
      font-family: 'Archivo', system-ui, sans-serif;
      color: #F0F1F2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 56px 100px;
    }
    .badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(237,33,0,0.9);
    }
    .titolo {
      margin-top: 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 82px;
      font-weight: 800;
      line-height: 0.95;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: -0.01em;
    }
    .titolo span { color: #ED2100; }
    .sub {
      margin-top: 28px;
      font-size: 34px;
      line-height: 1.35;
      text-align: center;
      color: rgba(240,241,242,0.65);
      max-width: 820px;
    }
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(237,33,0,0.2) 0%, transparent 68%);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .mascot-wrap {
      position: relative;
      z-index: 2;
      width: 720px;
      animation: {{MASCOT_ANIM}};
    }
    .mascot-wrap svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 24px 40px rgba(0,0,0,0.5)); }
    .bubble {
      position: absolute;
      top: -20px;
      right: 40px;
      background: #F0F1F2;
      color: #0F0B0A;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 16px 28px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      animation: pop 0.6s ease-out 0.3s both;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 32px;
      border: 12px solid transparent;
      border-top-color: #F0F1F2;
    }
    .bottom {
      text-align: center;
    }
    .nome {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 48px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ED2100;
      letter-spacing: 0.08em;
    }
    .url {
      margin-top: 12px;
      font-size: 22px;
      color: rgba(240,241,242,0.4);
      letter-spacing: 0.06em;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(-1deg); }
    }
    @keyframes wave {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(2deg); }
      75% { transform: translateY(-8px) rotate(-2deg); }
    }
    @keyframes vroom {
      0%, 100% { transform: translateX(0) scale(1); }
      50% { transform: translateX(12px) scale(1.02); }
    }
    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.8) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    #arm { transform-origin: 230px 125px; animation: armWave 1.2s ease-in-out infinite; }
    @keyframes armWave {
      0%, 100% { transform: rotate(-18deg); }
      50% { transform: rotate(-38deg); }
    }
  </style>
</head>
<body>
  <p class="badge">{{BADGE}}</p>
  <h1 class="titolo">{{TITOLO_HTML}}</h1>
  <p class="sub">{{SOTTOTITOLO}}</p>
  <div class="stage">
    <div class="glow"></div>
    <div class="mascot-wrap">
      {{MASCOT_SVG}}
      <div class="bubble">{{BUBBLE}}</div>
    </div>
  </div>
  <div class="bottom">
    <p class="nome">Rosso · mascotte MotoGarage</p>
    <p class="url">motogarage.info</p>
  </div>
</body>
</html>
