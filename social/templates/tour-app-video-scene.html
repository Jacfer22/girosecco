<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Archivo:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; }
    body {
      background: #0F0B0A;
      font-family: 'Archivo', system-ui, sans-serif;
      color: #F0F1F2;
    }
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 45%, {{GLOW_COLOR}} 0%, transparent 65%),
        linear-gradient(180deg, #141110 0%, #0F0B0A 55%, #0A0807 100%);
    }
    .speed-lines {
      position: absolute;
      inset: 0;
      opacity: {{SPEED_OPACITY}};
      pointer-events: none;
      overflow: hidden;
    }
    .speed-lines span {
      position: absolute;
      left: -20%;
      width: 140%;
      height: 3px;
      background: linear-gradient(90deg, transparent, {{ACCENT_COLOR}}, transparent);
      opacity: 0.55;
      transform: rotate(-8deg);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="speed-lines" aria-hidden="true">
    <span style="top:18%; animation: none; transform: translateX({{SPEED_X}}px) rotate(-6deg);"></span>
    <span style="top:42%; transform: translateX({{SPEED_X2}}px) rotate(-10deg); opacity:0.4;"></span>
    <span style="top:68%; transform: translateX({{SPEED_X3}}px) rotate(-5deg); opacity:0.35;"></span>
  </div>

  <div style="position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;gap:28px;">
    <!-- Fumetto / dialogo centrato sopra -->
    <div style="max-width:920px;width:100%;background:rgba(252,252,253,0.97);color:#141210;border-radius:24px;padding:22px 28px;font-size:28px;line-height:1.42;font-weight:500;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.45);opacity:{{BUBBLE_OPACITY}};">
      {{CAPTION}}
    </div>

    <!-- Solo telefono + mascotte, gruppo centrato -->
    <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;gap:20px;width:100%;max-width:980px;">
      {{MASCOT_LEFT}}
      <div style="flex-shrink:0;width:400px;transform:translateY({{PHONE_FLOAT}}px);">
        <div style="background:linear-gradient(145deg,#2a2826,#141210);border-radius:38px;padding:14px;border:2px solid rgba(255,255,255,0.12);box-shadow:0 28px 70px rgba(0,0,0,0.6);">
          <div style="width:96px;height:7px;margin:0 auto 12px;border-radius:4px;background:rgba(255,255,255,0.14);"></div>
          <div style="border-radius:28px;overflow:hidden;background:#0F0B0A;aspect-ratio:9/19.5;border:1px solid rgba(255,255,255,0.06);">
            <img src="{{SCREEN_IMG}}" alt="" style="width:100%;height:100%;object-fit:cover;object-position:top center;display:block;" />
          </div>
        </div>
      </div>
      {{MASCOT_RIGHT}}
    </div>
  </div>
</body>
</html>
