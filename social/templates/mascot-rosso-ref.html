<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Archivo:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; }
    body {
      background: #0F0B0A;
      font-family: 'Archivo', system-ui, sans-serif;
      color: #F0F1F2;
      display: flex;
      flex-direction: column;
    }
    .top { padding: 72px 56px 0; text-align: center; z-index: 3; }
    .badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #ED2100;
    }
    .speech {
      margin-top: 28px;
      background: #F0F1F2;
      color: #0F0B0A;
      border-radius: 28px;
      padding: 28px 32px;
      font-size: 30px;
      line-height: 1.45;
      font-weight: 500;
      text-align: left;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      position: relative;
    }
    .speech strong { color: #ED2100; font-weight: 700; }
    .speech::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      border: 16px solid transparent;
      border-top-color: #F0F1F2;
    }
    .speech em { font-style: normal; font-weight: 600; color: #9B1200; }
    .scene {
      flex: 1;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 48px;
    }
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 280px;
      background: linear-gradient(180deg, transparent 0%, #1a1a1a 40%, #121213 100%);
      overflow: hidden;
    }
    .road-lines {
      position: absolute;
      top: 50%;
      left: -100%;
      width: 300%;
      height: 4px;
      background: repeating-linear-gradient(90deg, #ED2100 0 40px, transparent 40px 80px);
      opacity: 0.35;
      animation: roadMove 1.2s linear infinite;
    }
    @keyframes roadMove {
      from { transform: translateX(0); }
      to { transform: translateX(-80px); }
    }
    .glow {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(237,33,0,0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .bike-wrap {
      position: relative;
      z-index: 2;
      width: 920px;
      animation: {{MASCOT_ANIM}};
      filter: drop-shadow(0 30px 50px rgba(0,0,0,0.65));
    }
    .bike-wrap img { width: 100%; height: auto; display: block; }
    .phone {
      position: absolute;
      right: 48px;
      bottom: 320px;
      width: 280px;
      z-index: 4;
      animation: phoneFloat 3s ease-in-out infinite;
    }
    @keyframes phoneFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(-1deg); }
    }
    .phone-shell {
      background: #1a1a1a;
      border-radius: 32px;
      padding: 12px;
      border: 3px solid #333;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .phone-screen {
      border-radius: 22px;
      overflow: hidden;
      background: #0F0B0A;
      min-height: 420px;
    }
    .footer {
      padding: 24px 56px 56px;
      text-align: center;
      z-index: 3;
    }
    .nome {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ED2100;
      letter-spacing: 0.06em;
    }
    .url { margin-top: 8px; font-size: 20px; color: rgba(240,241,242,0.45); }
    @keyframes ride {
      0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
      50% { transform: translateX(8px) translateY(-6px) rotate(0.5deg); }
    }
    @keyframes vroom {
      0%, 100% { transform: translateX(-6px) scale(1); }
      50% { transform: translateX(14px) scale(1.02); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    /* App mock interno telefono */
    .app-mock { padding: 20px 16px; font-family: 'Barlow Condensed', sans-serif; }
    .app-mock h3 { font-size: 22px; color: #ED2100; text-transform: uppercase; margin-bottom: 12px; }
    .app-mock p { font-size: 14px; color: rgba(240,241,242,0.7); line-height: 1.4; }
    .app-mock .chip {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 14px;
      background: #ED2100;
      color: #fff;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .app-map {
      margin-top: 12px;
      height: 120px;
      border-radius: 12px;
      background: linear-gradient(135deg, #232323 0%, #1a1a1a 100%);
      border: 1px solid rgba(237,33,0,0.3);
      position: relative;
      overflow: hidden;
    }
    .app-map::after {
      content: '';
      position: absolute;
      inset: 20%;
      border: 2px solid #ED2100;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(237,33,0,0.4);
    }
  </style>
</head>
<body>
  <div class="top">
    <p class="badge">{{BADGE}}</p>
    <div class="speech">{{SPEECH}}</div>
  </div>
  <div class="scene">
    <div class="glow"></div>
    <div class="road"><div class="road-lines"></div></div>
    <div class="bike-wrap">
      <img src="{{MASCOT_IMG}}" alt="Rosso" />
    </div>
    <div class="phone">
      <div class="phone-shell">
        <div class="phone-screen">
          {{APP_MOCK}}
        </div>
      </div>
    </div>
  </div>
  <div class="footer">
    <p class="nome">Rosso · MotoGarage</p>
    <p class="url">motogarage.info</p>
  </div>
</body>
</html>
