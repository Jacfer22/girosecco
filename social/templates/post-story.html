<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Archivo:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; }
    body {
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #28282B 0%, #0F0B0A 45%, #0F0B0A 100%);
      font-family: 'Archivo', system-ui, sans-serif;
      color: #F0F1F2;
      display: flex;
      flex-direction: column;
      padding: 72px 64px 88px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(237,33,0,0.35));
    }
    .brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1;
    }
    .brand span { color: #ED2100; }
    .tipo {
      margin-top: 48px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(237,33,0,0.85);
    }
    .titolo {
      margin-top: 32px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 96px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      max-width: 920px;
    }
    .sottotitolo {
      margin-top: 40px;
      font-size: 36px;
      line-height: 1.35;
      color: rgba(240,241,242,0.72);
      max-width: 880px;
    }
    .accent-line {
      margin-top: 56px;
      width: 120px;
      height: 6px;
      background: linear-gradient(90deg, #ED2100, rgba(237,33,0,0.2));
      border-radius: 3px;
    }
    .bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pill {
      display: inline-flex;
      align-self: flex-start;
      padding: 16px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(40,40,43,0.6);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .url {
      font-size: 24px;
      color: rgba(240,241,242,0.45);
      letter-spacing: 0.04em;
    }
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(237,33,0,0.12) 0%, transparent 70%);
      bottom: -120px;
      right: -180px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="top">
    <img class="logo" src="{{LOGO_DATA_URL}}" alt="" />
    <div class="brand">Moto<span>Garage</span></div>
  </div>
  <p class="tipo">{{TIPO_LABEL}}</p>
  <h1 class="titolo">{{TITOLO}}</h1>
  <p class="sottotitolo">{{SOTTOTITOLO}}</p>
  <div class="accent-line"></div>
  <div class="bottom">
    <span class="pill">{{PILL}}</span>
    <span class="url">motogarage.info</span>
  </div>
</body>
</html>
